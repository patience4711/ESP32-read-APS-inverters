name: Build ESP32-ECU Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Arduino CLI
      uses: arduino/setup-arduino-cli@v1
    
    - name: Install ESP32 core
      run: |
        arduino-cli config init --overwrite
        arduino-cli core install esp32:esp32@2.0.18
    
    - name: Install libraries
      run: |
        arduino-cli lib install "ArduinoJson"
        arduino-cli lib install "ESPAsyncWebServer"
        arduino-cli lib install "AsyncTCP"
        arduino-cli lib install "PubSubClient"
        arduino-cli lib install "NTPClient"
        arduino-cli lib install "Ticker"
        arduino-cli lib install "TimeLib"
    
    - name: Build firmware
      run: |
        arduino-cli compile \
          --fqbn esp32:esp32:esp32 \
          --output-dir ./build \
          ESP32_ECU_v1_4.ino
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: esp32-firmware-build-${{ github.run_number }}
        path: ./build/
        retention-days: 30
        compression-level: 6